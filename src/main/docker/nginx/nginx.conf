# =============================================================================
# Nginx reverse proxy configuration for quarkus-sse-poc
#
# Topology:
#   Client → Nginx :80  → upstream quarkus_app (round-robin)
#                           ├── app-1:8080
#                           └── app-2:8080
#   Nginx :80/minio/    → MinIO console :9001 (optional admin UI)
#
# SSE considerations:
#   - proxy_buffering off   → events are flushed immediately to the client
#   - proxy_cache  off      → no caching for event-stream responses
#   - proxy_read_timeout 3600s  → long-lived SSE connections kept alive
#   - Connection ''         → upstream keep-alive (HTTP/1.1)
#
# No sticky sessions required: Redis Pub/Sub guarantees that any app instance
# can deliver events to any connected SSE client.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Access log format ─────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Upstream: two Quarkus application instances ───────────────────────────
    upstream quarkus_app {
        # Default round-robin load balancing.
        # Sticky sessions are NOT needed because Redis Pub/Sub routes events
        # to all subscribed instances regardless of which one processed the request.
        server app-1:8080;
        server app-2:8080;

        # Reuse upstream connections (HTTP/1.1 keep-alive pool)
        keepalive 32;
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ------------------------------------------------------------------
        # SSE stream endpoint — must NOT buffer, must stay open
        # ------------------------------------------------------------------
        location /pdf/status {
            proxy_pass         http://quarkus_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection        '';       # keep-alive upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE-specific settings
            proxy_buffering             off;
            proxy_cache                 off;
            proxy_read_timeout          3600s;   # 1 h — keep SSE stream alive
            proxy_send_timeout          3600s;
            chunked_transfer_encoding   on;

            # Expose the Content-Type so the browser EventSource API
            # correctly identifies the text/event-stream response
            add_header Cache-Control    no-cache;
            add_header X-Accel-Buffering no;     # disable proxy_buffering even in sub-proxies
        }

        # ------------------------------------------------------------------
        # All other application endpoints
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://quarkus_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection        '';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  10s;
            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
        }

        # ------------------------------------------------------------------
        # MinIO web console (optional admin UI at /minio-console/)
        # ------------------------------------------------------------------
        location /minio-console/ {
            proxy_pass         http://minio:9001/;
            proxy_http_version 1.1;
            proxy_set_header   Connection        '';
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ------------------------------------------------------------------
        # Nginx status page (internal health probe)
        # ------------------------------------------------------------------
        location /nginx-health {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker/Podman bridge networks (172.x, 192.168.x)
            allow 10.88.0.0/16;   # Podman default rootless bridge (slirp4netns / pasta)
            allow 10.89.0.0/16;   # Podman alternative bridge range
            deny  all;
        }
    }
}


